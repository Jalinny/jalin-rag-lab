services:
  - type: web
    name: jalin-rag-backend
    runtime: python
    pythonVersion: "3.11"
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "import sys; sys.path.insert(0, '.'); from app.ingest import ingest_documents; print(ingest_documents())"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INGEST_SECRET
        sync: false
    plan: free
