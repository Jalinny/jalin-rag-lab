services:
  - type: web
    name: jalin-rag-backend
    runtime: python
    pythonVersion: "3.11"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INGEST_SECRET
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
    plan: free
